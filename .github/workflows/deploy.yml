name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main        # 每次推送到 main 分支自动部署
  workflow_dispatch: # 也可以手动触发

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 1. 拉取代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 运行 QA 验收脚本
      - name: Run QA checks
        run: node qa.js index.html
        continue-on-error: true  # QA失败也继续部署，但会在日志里显示

      # 3. 配置 GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v4

      # 4. 上传文件（整个仓库）
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'   # 上传根目录所有文件

      # 5. 部署
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
